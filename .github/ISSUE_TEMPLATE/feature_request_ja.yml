name: 機能要望
description: |
  新機能や改善案を提案するための Issue を作成します。背景、ユースケース、
  代替案などをできるだけ具体的に記載してください。
title: "[FEATURE] "
labels: [enhancement]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        改善案の提案ありがとうございます。解決したい課題と、この機能がどのように役立つかを教えてください。
  - type: input
    id: summary
    attributes:
      label: 概要
      description: 要望する機能を一文で簡潔に書いてください。
      placeholder: '例: "プロンプトをスキップする CLI オプションを追加したい"'
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: 背景とユーザーストーリー
      description: どんな課題があり、なぜこの機能が必要なのかを書いてください。
      placeholder: |
        ユーザーとして、CI でジェネレーターを非対話的に実行したいので、
        対話入力なしで必要な値を指定できるようにしたい。
  - type: textarea
    id: proposed
    attributes:
      label: 提案内容
      description: 想定している実装方法や API の変更案があれば記載してください。
      placeholder: '例: "`-n/--name` と `-f/--framework` オプションを追加する"'
  - type: textarea
    id: alternatives
    attributes:
      label: 検討した代替案
      description: 他に検討した方法があれば簡潔に記載してください。
  - type: input
    id: impact
    attributes:
      label: 想定される影響
      description: 後方互換性、テスト、テンプレートなど、影響しそうな範囲を書いてください。
      placeholder: '例: "後方互換性あり。任意フラグの追加のみ"'
  - type: textarea
    id: additional
    attributes:
      label: 補足情報
      description: 参考リンク、モックアップ、関連情報などがあれば記載してください。
